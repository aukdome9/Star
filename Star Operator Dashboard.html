<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060111">
  <title>Star Operator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            royal: "rgb(var(--royal-rgb) / <alpha-value>)",
            gold: "rgb(var(--gold-rgb) / <alpha-value>)",
            jade: "rgb(var(--jade-rgb) / <alpha-value>)",
            ice: "rgb(var(--ice-rgb) / <alpha-value>)",
            rose: "rgb(var(--rose-rgb) / <alpha-value>)",
            amber: "rgb(var(--amber-rgb) / <alpha-value>)",
            zinc: {
              50:"#f8f6fc",100:"#f1edf8",200:"#e2dbef",300:"#c9bde0",
              400:"#a394c4",500:"#83729f",600:"#665681",700:"#4a3d63",
              800:"#322847",900:"#1f1733",950:"#120b22"
            }
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <style>
    :root {
      --font-body: 'Outfit', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: 'Cinzel', Georgia, serif;
      --midnight-rgb: 12 2 32;
      --midnight-deep-rgb: 5 1 14;
      --midnight-panel-rgb: 24 15 43;
      --midnight-lift-rgb: 31 22 50;
      --midnight-drop-rgb: 11 2 29;
      --bg-pitch: rgb(var(--midnight-deep-rgb));
      --bg-panel: rgb(var(--midnight-panel-rgb) / 0.72);
      --bg-inner: rgb(var(--midnight-deep-rgb) / 0.65);
      --royal-rgb: 157 78 221;
      --royal-deep-rgb: 123 44 191;
      --royal-bright-rgb: 199 125 255;
      --gold-rgb: 232 193 104;
      --jade-rgb: 61 220 151;
      --ice-rgb: 76 201 240;
      --rose-rgb: 247 37 133;
      --amber-rgb: 255 180 84;
      --border-thin: rgb(var(--royal-rgb) / 0.09);
      --royal: rgb(var(--royal-rgb));
      --gold: rgb(var(--gold-rgb));
      --jade: rgb(var(--jade-rgb));
      --ice: rgb(var(--ice-rgb));
      --glow-royal: rgb(var(--royal-deep-rgb) / 0.45);
      --text-primary: #f5f2fa;
      --text-muted: #6f5d96;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg-pitch);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 13.5px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root { width: 100%; height: 100%; position: relative; z-index: 10; }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 50% 115%, rgb(var(--royal-deep-rgb) / 0.20) 0%, transparent 58%),
        radial-gradient(ellipse at 50% -12%, rgb(var(--royal-deep-rgb) / 0.13) 0%, transparent 52%),
        radial-gradient(circle at 50% 50%, rgb(var(--midnight-rgb) / 0.85) 0%, rgb(var(--midnight-deep-rgb)) 100%);
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgb(var(--royal-rgb) / 0.30), rgb(var(--royal-deep-rgb) / 0.16));
      border-radius: 4px;
    }
    .glass-panel {
      background: linear-gradient(180deg, rgb(var(--midnight-lift-rgb) / 0.78) 0%, var(--bg-panel) 38%, rgb(var(--midnight-drop-rgb) / 0.74) 100%);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border-thin);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,.55), 0 22px 56px -24px var(--glow-royal), inset 0 1px 0 rgb(var(--royal-bright-rgb) / 0.05);
      position: relative;
    }
    .glass-panel::before, .glass-panel::after {
      content: ''; position: absolute; width: 12px; height: 12px; pointer-events: none; opacity: .38;
    }
    .glass-panel::before {
      top: -1px; left: -1px;
      border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold);
      border-top-left-radius: 16px;
    }
    .glass-panel::after {
      bottom: -1px; right: -1px;
      border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold);
      border-bottom-right-radius: 16px;
    }
    .glass-input {
      background: var(--bg-inner);
      border: 1px solid var(--border-thin);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 12px;
      width: 100%;
    }
    .glass-input:focus {
      outline: none;
      border-color: rgb(var(--royal-rgb) / 0.65);
      box-shadow: 0 0 0 3px rgb(var(--royal-rgb) / 0.12);
    }
    .glass-button {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border-thin);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text-primary);
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .glass-button:hover { background: rgb(var(--royal-rgb) / 0.07); border-color: rgb(var(--royal-rgb) / 0.55); }
    .glass-button.active {
      background: linear-gradient(135deg, rgb(var(--royal-deep-rgb) / 0.28), rgb(var(--royal-rgb) / 0.08));
      border-color: rgb(var(--royal-rgb) / 0.6);
    }
    .glass-button:disabled { opacity: .5; cursor: not-allowed; }
    .status-glow {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .status-glow.green { background: var(--jade); box-shadow: 0 0 8px var(--jade); }
    .status-glow.gold { background: var(--gold); }
    .status-glow.royal { background: var(--royal); box-shadow: 0 0 8px var(--royal); }
    .status-glow.amber { background: var(--amber); }
    .view-enter { animation: viewEnter .32s cubic-bezier(.16,1,.3,1) both; }
    @keyframes viewEnter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .font-display { font-family: var(--font-display); }
    .font-mono { font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const STAR_BACKEND_URL = (() => {
      try {
        const params = new URLSearchParams(window.location.search);
        return params.get("star") || localStorage.getItem("starUrl") || "http://127.0.0.1:8765";
      } catch (e) { return "http://127.0.0.1:8765"; }
    })();

    const GITHUB_REPO = "https://github.com/aukdome9/Star";

    // Access gate — only a hash is stored (not the password). Session lasts for this browser tab.
    // NOTE: Client-side gates are NOT real security on a public repo. Prefer a PRIVATE GitHub repo.
    const AUTH_HASH = "0bca80082275884bfcebc0716a67eef6776bfd86c9652e34d55875d3010d7348";
    const AUTH_SESSION_KEY = "star_operator_auth_v1";

    async function sha256Hex(text) {
      const data = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function verifyCredentials(username, password) {
      const u = (username || "").trim().toLowerCase();
      const p = (password || "").trim().toLowerCase();
      const digest = await sha256Hex(u + ":" + p);
      return digest === AUTH_HASH;
    }

    async function starFetch(path, opts = {}) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), opts.timeout || 8000);
      try {
        const r = await fetch(`${STAR_BACKEND_URL}${path}`, {
          headers: { "Content-Type": "application/json" },
          signal: ctrl.signal,
          ...opts,
        });
        clearTimeout(t);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.json();
      } catch (e) { clearTimeout(t); throw e; }
    }

    const NAV = [
      { id: "dashboard", label: "Daily Command" },
      { id: "chat", label: "Grok Operator" },
      { id: "memory", label: "Master Vault" },
      { id: "settings", label: "Settings" },
    ];

    function Icon({ name }) {
      const common = { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.5 };
      if (name === "dash") return <svg {...common}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>;
      if (name === "chat") return <svg {...common}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
      if (name === "mem") return <svg {...common}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
      if (name === "set") return <svg {...common}><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>;
      return <svg {...common}><circle cx="12" cy="12" r="9"/></svg>;
    }

    function LoginGate({ onUnlock }) {
      const [user, setUser] = useState("");
      const [pass, setPass] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);

      const submit = async (e) => {
        if (e) e.preventDefault();
        setBusy(true);
        setErr("");
        try {
          const ok = await verifyCredentials(user, pass);
          if (!ok) {
            setErr("Invalid username or password.");
            setBusy(false);
            return;
          }
          try { sessionStorage.setItem(AUTH_SESSION_KEY, "1"); } catch (x) {}
          onUnlock();
        } catch (ex) {
          setErr("Could not verify credentials in this browser.");
        } finally {
          setBusy(false);
        }
      };

      return (
        <div className="flex h-screen w-screen items-center justify-center p-4 relative z-10">
          <form onSubmit={submit} className="glass-panel p-6 md:p-8 w-full max-w-md space-y-4">
            <div className="text-center space-y-1">
              <div className="text-2xl text-gold font-display">★</div>
              <h1 className="text-lg font-display tracking-widest uppercase">Star Operator</h1>
              <p className="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">Access required</p>
            </div>
            <div className="space-y-1">
              <label className="text-[10px] font-mono text-zinc-500 uppercase">Username</label>
              <input
                className="glass-input"
                autoComplete="username"
                autoFocus
                value={user}
                onChange={e => setUser(e.target.value)}
                placeholder="username"
              />
            </div>
            <div className="space-y-1">
              <label className="text-[10px] font-mono text-zinc-500 uppercase">Password</label>
              <input
                className="glass-input"
                type="password"
                autoComplete="current-password"
                value={pass}
                onChange={e => setPass(e.target.value)}
                placeholder="password"
              />
            </div>
            {err && <p className="text-[11px] font-mono text-rose">{err}</p>}
            <button type="submit" className="glass-button active w-full justify-center" disabled={busy}>
              {busy ? "Checking…" : "Enter"}
            </button>
            <p className="text-[9px] font-mono text-zinc-600 text-center leading-relaxed">
              Protected entry for the Star archive. Session lasts while this tab is open.
            </p>
          </form>
        </div>
      );
    }

    function App() {
      const [authed, setAuthed] = useState(() => {
        try { return sessionStorage.getItem(AUTH_SESSION_KEY) === "1"; } catch (e) { return false; }
      });
      const [tab, setTab] = useState(() => {
        try {
          const t = new URLSearchParams(window.location.search).get("tab");
          if (t && NAV.some(n => n.id === t)) return t;
        } catch (e) {}
        return "dashboard";
      });
      const [collapsed, setCollapsed] = useState(false);
      const [online, setOnline] = useState(false);
      const [backend, setBackend] = useState("");
      const [sessionId, setSessionId] = useState("");
      const [health, setHealth] = useState(null);
      const [today, setToday] = useState(null);
      const [calDays, setCalDays] = useState({});
      const [newTask, setNewTask] = useState("");
      const [vaultHits, setVaultHits] = useState([]);
      const [vaultQ, setVaultQ] = useState("");
      const [vaultSrc, setVaultSrc] = useState("all");
      const [noteBody, setNoteBody] = useState(null);

      // chat
      const [input, setInput] = useState("");
      const [typing, setTyping] = useState(false);
      const [toolHint, setToolHint] = useState("");
      const [msgs, setMsgs] = useState([{
        id: 1, sender: "Grok", type: "status",
        text: "Star Operator online. Master vault is the archive — create, edit, organize, and schedule work here. Ask me anything about your notes, tasks, or Second Brain.",
        timestamp: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false }),
      }]);
      const idRef = useRef(1);
      const scrollRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [msgs, typing]);

      const refresh = async () => {
        try {
          const h = await starFetch("/health");
          setOnline(!!h.ok);
          setHealth(h);
          setBackend((h.chat && h.chat.mode) || "");
          const sid = (h.chat && h.chat.acp && h.chat.acp.session_id) || h.chat?.resume_session_id || "";
          if (sid) setSessionId(sid);
        } catch (e) { setOnline(false); }
        try {
          const t = await starFetch("/tasks/today");
          if (t.ok) setToday(t);
        } catch (e) {}
        try {
          const c = await starFetch("/tasks/calendar?days=28");
          if (c.ok) setCalDays(c.days || {});
        } catch (e) {}
        try {
          const m = await starFetch(`/memory/query?vault=${encodeURIComponent(vaultSrc)}&q=${encodeURIComponent(vaultQ)}&limit=40`);
          if (m.ok) setVaultHits(m.results || []);
        } catch (e) {}
      };

      useEffect(() => {
        refresh();
        const t = setInterval(refresh, 15000);
        return () => clearInterval(t);
      }, [vaultSrc, vaultQ]);

      const addTask = async () => {
        if (!newTask.trim()) return;
        try {
          await starFetch("/tasks", {
            method: "POST",
            body: JSON.stringify({ title: newTask.trim(), target: "daily" }),
          });
          setNewTask("");
          const t = await starFetch("/tasks/today");
          if (t.ok) setToday(t);
        } catch (e) {}
      };

      const newSession = async () => {
        try {
          const d = await starFetch("/chat/session/new", { method: "POST", timeout: 60000, body: "{}" });
          if (d?.acp?.session_id) setSessionId(d.acp.session_id);
          if (d?.mode) setBackend(d.mode);
          idRef.current += 1;
          setMsgs(prev => [...prev, {
            id: idRef.current, sender: "System", type: "status",
            text: "New continuous session started.",
            timestamp: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false }),
          }]);
        } catch (e) {}
      };

      const send = async () => {
        if (!input.trim() || typing) return;
        const userText = input.trim();
        const forceNew = userText === "/new" || userText === "/reset";
        idRef.current += 1;
        const userMsg = {
          id: idRef.current, sender: "Operator", type: "user", text: userText,
          timestamp: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false }),
        };
        const history = [...msgs, userMsg]
          .filter(m => m.type === "user" || m.sender === "Grok")
          .slice(-20)
          .map(m => ({ role: m.sender === "Operator" ? "user" : "assistant", content: m.text }));
        setMsgs(prev => [...prev, userMsg]);
        setInput("");
        setTyping(true);
        setToolHint("");
        idRef.current += 1;
        const streamId = idRef.current;
        setMsgs(prev => [...prev, {
          id: streamId, sender: "Grok", type: "response", text: "", streaming: true,
          timestamp: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", hour12: false }),
        }]);
        const patch = (text, extra = {}) => setMsgs(prev => prev.map(m => m.id === streamId ? { ...m, text, ...extra } : m));
        try {
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 300000);
          const res = await fetch(`${STAR_BACKEND_URL}/chat/stream`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: history, force_new_session: forceNew }),
            signal: ctrl.signal,
          });
          clearTimeout(timer);
          if (!res.ok || !res.body) {
            const data = await starFetch("/chat", {
              method: "POST", timeout: 180000,
              body: JSON.stringify({ messages: history }),
            });
            if (data?.ok && data.reply) {
              if (data.backend) setBackend(data.backend);
              if (data.session_id) setSessionId(data.session_id);
              patch(data.reply, { streaming: false });
            } else {
              patch(data?.detail || "Chat failed. Run start star.", { sender: "System", streaming: false });
            }
            return;
          }
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "", assembled = "", eventName = "message";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split("\n");
            buffer = parts.pop() || "";
            for (const line of parts) {
              if (line.startsWith("event:")) eventName = line.slice(6).trim();
              else if (line.startsWith("data:")) {
                const raw = line.slice(5).trim();
                if (!raw) continue;
                let data = {};
                try { data = JSON.parse(raw); } catch (e) { data = { text: raw }; }
                if (eventName === "meta") {
                  if (data.backend) setBackend(data.backend);
                  if (data.session_id) setSessionId(data.session_id);
                } else if (eventName === "chunk") {
                  assembled += (data.text || "");
                  patch(assembled, { streaming: true });
                } else if (eventName === "tool") {
                  setToolHint(`${data.title || "tool"}${data.status ? " · " + data.status : ""}`);
                } else if (eventName === "done") {
                  if (data.backend) setBackend(data.backend);
                  if (data.session_id) setSessionId(data.session_id);
                  if (data.reply && !assembled) assembled = data.reply;
                  patch(assembled || data.reply || "", { streaming: false });
                } else if (eventName === "error") {
                  patch(data.detail || "Stream error", { sender: "System", streaming: false });
                }
                eventName = "message";
              }
            }
          }
          if (assembled) patch(assembled, { streaming: false });
          else if (!assembled) {
            const data = await starFetch("/chat", { method: "POST", timeout: 180000, body: JSON.stringify({ messages: history }) });
            if (data?.ok && data.reply) patch(data.reply, { streaming: false });
            else patch(data?.detail || "Empty reply.", { sender: "System", streaming: false });
          }
        } catch (e) {
          patch("Cannot reach Star Integration. Run `start star`.", { sender: "System", streaming: false });
        } finally {
          setTyping(false);
          setToolHint("");
          refresh();
        }
      };

      const openNote = async (path) => {
        try {
          const n = await starFetch(`/memory/note?vault=master&path=${encodeURIComponent(path)}`);
          setNoteBody(n);
        } catch (e) {
          setNoteBody({ title: path, content: "Could not load note.", rel_path: path });
        }
      };

      const label = (NAV.find(n => n.id === tab) || {}).label || tab;

      const logout = () => {
        try { sessionStorage.removeItem(AUTH_SESSION_KEY); } catch (e) {}
        setAuthed(false);
      };

      if (!authed) {
        return <LoginGate onUnlock={() => setAuthed(true)} />;
      }

      return (
        <div className="flex h-screen w-screen overflow-hidden relative z-10 p-2 md:p-3 gap-2 md:gap-3">
          {/* Sidebar */}
          <aside className={`glass-panel flex flex-col justify-between transition-all ${collapsed ? "w-16" : "w-56"}`}>
            <div>
              <div className="p-4 flex items-center gap-3 border-b border-royal/10">
                <div className="w-9 h-9 rounded-xl bg-black flex items-center justify-center border border-royal/25 text-gold font-display text-sm">★</div>
                {!collapsed && (
                  <div>
                    <h1 className="font-semibold text-sm tracking-widest uppercase font-display">Star Operator</h1>
                    <span className="text-[9px] text-gold/80 font-mono tracking-widest block mt-0.5">MASTER ARCHIVE</span>
                  </div>
                )}
              </div>
              <nav className="p-2 space-y-1">
                {NAV.map(item => {
                  const active = tab === item.id;
                  const icon = item.id === "dashboard" ? "dash" : item.id === "chat" ? "chat" : item.id === "memory" ? "mem" : "set";
                  return (
                    <button key={item.id} type="button" onClick={() => setTab(item.id)}
                      className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-left transition-all ${active ? "bg-royal/15 border border-royal/40 text-zinc-100" : "border border-transparent text-zinc-400 hover:text-zinc-200 hover:bg-white/5"}`}>
                      <Icon name={icon} />
                      {!collapsed && <span className="text-xs font-medium">{item.label}</span>}
                    </button>
                  );
                })}
              </nav>
            </div>
            <div className="p-3 border-t border-royal/10 space-y-2">
              <div className="flex items-center gap-2 text-[10px] font-mono">
                <span className={`status-glow ${online ? "green" : "amber"}`}></span>
                {!collapsed && <span className={online ? "text-jade" : "text-amber"}>{online ? backend || "live" : "offline"}</span>}
              </div>
              <button type="button" className="glass-button w-full justify-center text-[10px]" onClick={() => setCollapsed(c => !c)}>
                {collapsed ? "»" : "Collapse"}
              </button>
              {!collapsed && (
                <button type="button" className="glass-button w-full justify-center text-[10px] text-zinc-500" onClick={logout}>
                  Lock
                </button>
              )}
            </div>
          </aside>

          {/* Main */}
          <main className="flex-1 flex flex-col min-w-0 min-h-0">
            <header className="glass-panel px-4 py-3 mb-2 md:mb-3 flex items-center justify-between gap-3">
              <div>
                <div className="text-[9px] font-mono text-royal uppercase tracking-widest">Star System</div>
                <h2 className="text-sm font-display text-zinc-100">{label}</h2>
              </div>
              <div className="flex items-center gap-2 flex-wrap justify-end">
                {sessionId && <span className="text-[9px] font-mono text-zinc-500" title={sessionId}>session {String(sessionId).slice(0, 8)}…</span>}
                <a href={GITHUB_REPO} target="_blank" rel="noreferrer" className="text-[10px] font-mono px-2 py-1 rounded border border-royal/30 text-royal hover:bg-royal/10">
                  GitHub
                </a>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto min-h-0 space-y-3">
              {/* DASHBOARD */}
              {tab === "dashboard" && (
                <div className="view-enter space-y-3">
                  <div className="glass-panel p-4 md:p-5 border-l-4 border-gold space-y-3">
                    <div className="flex flex-wrap justify-between gap-2">
                      <div>
                        <span className="text-[9px] text-gold font-mono tracking-widest uppercase">Daily Command</span>
                        <h3 className="text-lg font-display mt-1">{today?.date || "—"} · Today's work</h3>
                        <p className="text-[11px] text-zinc-500 font-mono mt-0.5">
                          {today?.daily_note || "Calendar/Daily"} · also in Obsidian Dashboard.md
                        </p>
                      </div>
                      <button type="button" className="glass-button active text-[10px]" onClick={() => setTab("chat")}>Talk to Grok</button>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
                      <div className="lg:col-span-2 space-y-2">
                        {(today?.open_tasks || []).length === 0 && (
                          <p className="text-xs text-zinc-500 font-mono p-3 rounded-xl bg-black/40 border border-white/5">No open tasks for today. Add one below.</p>
                        )}
                        {(today?.open_tasks || []).map((t, i) => (
                          <div key={i} className="p-3 rounded-xl bg-black/50 border border-royal/10 space-y-1">
                            <div className="text-xs text-zinc-100 font-medium">{t.text}</div>
                            <div className="flex flex-wrap gap-2 text-[9px] font-mono text-zinc-500">
                              {t.relates_to && <span className="text-royal">🔗 {t.relates_to}</span>}
                              {t.outcome && <span className="text-gold">🎯 {t.outcome}</span>}
                              <span className="text-zinc-600">{t.path}</span>
                            </div>
                          </div>
                        ))}
                        <div className="flex gap-2">
                          <input className="glass-input" placeholder="Add task to today's daily note…" value={newTask}
                            onChange={e => setNewTask(e.target.value)} onKeyDown={e => e.key === "Enter" && addTask()} />
                          <button type="button" className="glass-button active" onClick={addTask}>Add</button>
                        </div>
                      </div>
                      <div className="space-y-2">
                        <div className="text-[9px] font-mono uppercase text-zinc-500 tracking-wider">28-day schedule</div>
                        <div className="grid grid-cols-7 gap-1">
                          {Object.keys(calDays).slice(0, 28).map(d => {
                            const n = (calDays[d] || []).length;
                            const isToday = today && d === today.date;
                            return (
                              <div key={d} title={`${d}: ${n} task(s)`}
                                className={`aspect-square rounded-md text-[8px] font-mono flex flex-col items-center justify-center border ${
                                  isToday ? "border-gold bg-gold/15 text-gold" :
                                  n > 0 ? "border-royal/30 bg-royal/10 text-royal" :
                                  "border-white/5 bg-black/30 text-zinc-600"
                                }`}>
                                <span>{d.slice(8)}</span>
                                {n > 0 && <span className="text-[7px]">{n}</span>}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-3">
                    {[
                      { l: "Vault status", v: online ? "Online" : "Offline", n: backend || "start star" },
                      { l: "Open today", v: String(today?.open_count ?? "—"), n: `${today?.done_count ?? 0} done` },
                      { l: "Master notes", v: String(vaultHits.length || "—"), n: "live search hits" },
                      { l: "Phone access", v: "GitHub", n: "aukdome9/Star" },
                    ].map((m, i) => (
                      <div key={i} className="glass-panel p-4">
                        <div className="text-[10px] font-mono text-zinc-500 uppercase">{m.l}</div>
                        <div className="text-lg font-mono text-zinc-100 my-1">{m.v}</div>
                        <div className="text-[10px] text-zinc-500">{m.n}</div>
                      </div>
                    ))}
                  </div>

                  <div className="glass-panel p-4 space-y-2">
                    <h4 className="text-xs font-display text-royal uppercase tracking-wider">Core mission</h4>
                    <p className="text-xs text-zinc-400 leading-relaxed max-w-3xl">
                      Continuous Grok archives and organizes your <strong className="text-zinc-200">Master Obsidian vault</strong>.
                      Edit in Obsidian, this dashboard, or chat. Second Brain + agents live inside Master.
                      Mirror: <a className="text-royal underline" href={GITHUB_REPO} target="_blank" rel="noreferrer">{GITHUB_REPO}</a>
                    </p>
                    <div className="flex flex-wrap gap-2 text-[10px] font-mono pt-1">
                      <span className="px-2 py-1 rounded border border-white/10 text-zinc-400">Dashboard.md</span>
                      <span className="px-2 py-1 rounded border border-white/10 text-zinc-400">Calendar/Daily</span>
                      <span className="px-2 py-1 rounded border border-white/10 text-zinc-400">Second Brain</span>
                      <span className="px-2 py-1 rounded border border-white/10 text-zinc-400">STAR OPERATOR.md</span>
                    </div>
                  </div>
                </div>
              )}

              {/* CHAT */}
              {tab === "chat" && (
                <div className="view-enter glass-panel flex flex-col h-[calc(100vh-120px)] min-h-[420px]">
                  <div className="p-3 border-b border-royal/15 flex justify-between items-center gap-2 flex-wrap bg-black/20">
                    <div className="flex items-center gap-2">
                      <Icon name="chat" />
                      <span className="font-semibold text-xs font-display">Grok · Continuous Operator</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className={`text-[10px] font-mono uppercase ${online ? "text-jade" : "text-amber"}`}>
                        {online ? `Live · ${backend || "acp"}` : "Offline"}
                      </span>
                      {toolHint && <span className="text-[9px] font-mono text-ice">{toolHint}</span>}
                      <button type="button" className="text-[9px] font-mono px-2 py-0.5 rounded border border-royal/30 text-royal" onClick={newSession}>New session</button>
                    </div>
                  </div>
                  <div className="p-3 border-b border-royal/10 bg-black/40 flex gap-2">
                    <input className="glass-input flex-1" placeholder="Instruct the operator — /mem query · edit notes · plan the day…"
                      value={input} onChange={e => setInput(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && !e.shiftKey && send()} disabled={typing} autoFocus />
                    <button type="button" className="glass-button active" onClick={send} disabled={typing}>{typing ? "…" : "Send"}</button>
                  </div>
                  <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-3">
                    {msgs.map(m => (
                      <div key={m.id} className={`flex ${m.sender === "Operator" ? "justify-end" : "justify-start"}`}>
                        <div className={`max-w-[80%] rounded-xl p-3.5 border ${
                          m.sender === "Operator" ? "bg-royal/10 border-royal/30" :
                          m.sender === "System" ? "bg-amber/5 border-amber/20" :
                          "bg-black/80 border-royal/10"
                        }`}>
                          <div className="flex justify-between gap-4 mb-2 border-b border-white/5 pb-1">
                            <span className="font-mono text-[9px] text-royal uppercase">{m.sender}</span>
                            <span className="text-[9px] text-zinc-500">{m.timestamp}</span>
                          </div>
                          <p className="text-xs leading-relaxed whitespace-pre-wrap font-mono text-zinc-300">{m.text || (m.streaming ? "…" : "")}</p>
                        </div>
                      </div>
                    ))}
                    {typing && (
                      <div className="flex items-center gap-2 text-xs font-mono text-zinc-500">
                        <span className="status-glow royal"></span> Grok thinking…
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* MEMORY */}
              {tab === "memory" && (
                <div className="view-enter grid grid-cols-1 lg:grid-cols-2 gap-3 h-[calc(100vh-120px)] min-h-[420px]">
                  <div className="glass-panel p-4 flex flex-col min-h-0">
                    <div className="flex justify-between items-center mb-3 border-b border-royal/15 pb-2">
                      <h4 className="text-xs font-display text-royal uppercase tracking-wider">Master · Unified Network</h4>
                      <span className="text-[9px] font-mono text-zinc-500">{vaultHits.length} hits</span>
                    </div>
                    <div className="flex gap-1 mb-2">
                      {[{k:"all",l:"All"},{k:"master",l:"Master"},{k:"brain",l:"Second Brain"}].map(v => (
                        <button key={v.k} type="button" onClick={() => setVaultSrc(v.k)}
                          className={`text-[9px] font-mono px-2 py-0.5 rounded border ${vaultSrc===v.k ? "bg-royal/20 border-royal text-royal" : "border-white/10 text-zinc-500"}`}>{v.l}</button>
                      ))}
                    </div>
                    <input className="glass-input mb-3" placeholder="Search vault…" value={vaultQ} onChange={e => setVaultQ(e.target.value)} />
                    <div className="flex-1 overflow-y-auto space-y-1.5 pr-1">
                      {vaultHits.map(n => (
                        <button key={n.id || n.path} type="button" onClick={() => openNote(n.path)}
                          className="w-full text-left p-2.5 rounded-xl border border-white/5 bg-black/40 hover:border-royal/30">
                          <div className="text-[10px] font-mono text-royal">{n.namespace || "note"} · {n.type}</div>
                          <div className="text-xs text-zinc-200 truncate">{n.title}</div>
                          <div className="text-[10px] text-zinc-500 truncate">{n.summary}</div>
                        </button>
                      ))}
                      {vaultHits.length === 0 && <p className="text-xs text-zinc-500 font-mono p-3">No hits. Is Star online?</p>}
                    </div>
                  </div>
                  <div className="glass-panel p-4 flex flex-col min-h-0">
                    <h4 className="text-xs font-display text-royal uppercase tracking-wider mb-3 border-b border-royal/15 pb-2">Note preview</h4>
                    {!noteBody && <p className="text-xs text-zinc-500 font-mono">Select a hit to preview. Full edit in Obsidian or via Grok chat.</p>}
                    {noteBody && (
                      <div className="flex-1 overflow-y-auto space-y-2">
                        <div className="text-sm font-display text-zinc-100">{noteBody.title}</div>
                        <div className="text-[10px] font-mono text-zinc-500">{noteBody.rel_path || noteBody.path}</div>
                        <pre className="text-[11px] font-mono text-zinc-400 whitespace-pre-wrap leading-relaxed">{(noteBody.content || "").slice(0, 12000)}</pre>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* SETTINGS */}
              {tab === "settings" && (
                <div className="view-enter glass-panel p-5 space-y-4 max-w-2xl">
                  <h3 className="text-sm font-display text-royal uppercase tracking-wider">Settings</h3>
                  <div className="space-y-2 text-xs">
                    <div className="flex justify-between border-b border-white/5 py-2">
                      <span className="text-zinc-500">Backend</span>
                      <span className="font-mono text-zinc-300">{STAR_BACKEND_URL}</span>
                    </div>
                    <div className="flex justify-between border-b border-white/5 py-2">
                      <span className="text-zinc-500">GitHub</span>
                      <a className="font-mono text-royal" href={GITHUB_REPO} target="_blank" rel="noreferrer">{GITHUB_REPO}</a>
                    </div>
                    <div className="flex justify-between border-b border-white/5 py-2">
                      <span className="text-zinc-500">Master vault</span>
                      <span className="font-mono text-zinc-400 text-right max-w-[60%] truncate">{health?.master_vault?.path || "—"}</span>
                    </div>
                    <div className="flex justify-between border-b border-white/5 py-2">
                      <span className="text-zinc-500">Second Brain</span>
                      <span className="font-mono text-zinc-400 text-right max-w-[60%] truncate">{health?.vault?.path || "—"}</span>
                    </div>
                    <div className="flex justify-between border-b border-white/5 py-2">
                      <span className="text-zinc-500">Grok cwd</span>
                      <span className="font-mono text-zinc-400 text-right max-w-[60%] truncate">{health?.chat?.acp?.cwd || "—"}</span>
                    </div>
                    <div className="flex justify-between border-b border-white/5 py-2">
                      <span className="text-zinc-500">Unified knowledge</span>
                      <span className="font-mono text-jade">{String(health?.knowledge?.unified ?? "—")}</span>
                    </div>
                  </div>
                  <p className="text-[11px] text-zinc-500 leading-relaxed">
                    Engines (Ledger, Local Presence, Ethnine, Monastery, Ashley) and Apple Sync UI have been removed.
                    Core mission: continuous Grok + Master Obsidian archive + daily tasks/calendar.
                    Launch with <span className="font-mono text-royal">start star</span>.
                  </p>
                  <button type="button" className="glass-button active" onClick={refresh}>Refresh status</button>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
